services:
  # App (PHP)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-vovo
    container_name: vovo
    restart: unless-stopped
    user: "1000:1000"
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - laravel-net

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: nginx_vovo
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel-net
    depends_on:
      - app

  # PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: postgres_vovo
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - laravel-net
    ports:
      - "5434:5432"

networks:
  laravel-net:
    driver: bridge

volumes:
  pgdata:
